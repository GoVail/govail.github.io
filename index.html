<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GoVail AI Governance Gateway 공식 기술 블로그">
  <title>GoVail Blog — AI Governance Layer</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Highlight.js Github Dark Style -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  
  <!-- Custom Style -->
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Background Glow FX -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <a href="#/" class="logo-link">
          <span class="logo-icon">🛡️</span>
          <span class="logo-text">GoVail</span>
        </a>
        <nav class="header-nav">
          <a href="https://github.com/GoVail" target="_blank" rel="noopener noreferrer" class="nav-btn">
            <svg class="icon-git" viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            GitHub
          </a>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      
      <!-- Home View (Post List) -->
      <section id="home-view" class="view-section active">
        <div class="hero-section">
          <h1>GoVail Technical Blog</h1>
          <p class="hero-subtitle">
            AI 에이전트와 LLM을 더 안전하고 신뢰할 수 있게 활용하기 위한 여정과 기록입니다.
            우리가 마주한 보안 문제, 그리고 이를 풀기 위해 설계한 정책 게이트웨이 아키텍처에 대해 공유합니다.
          </p>
        </div>
        
        <div class="posts-filter-bar">
          <span class="filter-title">모든 아티클</span>
          <div class="divider"></div>
        </div>

        <div id="posts-list" class="posts-grid">
          <!-- Dynamically populated via index.js -->
          <div class="loading">포스트 목록을 불러오는 중...</div>
        </div>
      </section>

      <!-- Post Detail View (Markdown Reader) -->
      <section id="post-view" class="view-section">
        <div class="post-navigation">
          <a href="#/" class="back-link">
            <span class="arrow">←</span> 목록으로 돌아가기
          </a>
        </div>
        <article class="post-container">
          <div class="post-meta-header">
            <span id="post-category" class="post-category-badge">Category</span>
            <h1 id="post-title" class="post-detail-title">포스트 제목</h1>
            <div id="post-date" class="post-detail-date">YYYY-MM-DD</div>
          </div>
          
          <hr class="post-divider">
          
          <div id="post-content" class="markdown-body">
            <!-- Dynamically populated via index.js -->
            <div class="loading">포스트 본문을 불러오는 중...</div>
          </div>
        </article>
      </section>
      
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>© 2026 GoVail. Built with build-less SPA design.</p>
    </footer>
  </div>

  <!-- Marked (Markdown Parser) CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js (Code Highlighter) CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <!-- Custom JS -->
  <script src="index.js"></script>
</body>
</html>
